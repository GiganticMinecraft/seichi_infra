# policyAuditMode が有効な間は実際のドロップは発生せず、
# audit-denied として Hubble メトリクスに記録される。
# Hubble NetworkPolicy Planning ダッシュボードで
# 必要な allow ルールを特定した後、個別の許可ポリシーを追加し、
# audit-denied が 0 になったことを確認してから
# policyAuditMode を無効化すること。
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-all
spec:
  endpointSelector: {}
  ingress:
    - {}
  egress:
    - {}
