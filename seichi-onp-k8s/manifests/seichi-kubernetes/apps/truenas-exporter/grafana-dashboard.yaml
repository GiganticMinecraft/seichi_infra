apiVersion: v1
kind: ConfigMap
metadata:
  name: truenas-exporter-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Infrastructure"
data:
  truenas-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "description": "TrueNAS monitoring dashboard",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "panels": [],
          "title": "System Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^version$/", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_system_info", "format": "table", "instant": true, "refId": "A" }
          ],
          "title": "System Version",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_system_uptime_seconds", "refId": "A" }
          ],
          "title": "Uptime",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum(truenas_alerts_active_total)", "refId": "A" }
          ],
          "title": "Active Alerts",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": { "displayMode": "gradient", "minVizHeight": 10, "minVizWidth": 0, "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showUnfilled": true },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_alerts_active_total", "legendFormat": "{{level}}", "refId": "A" }
          ],
          "title": "Alerts by Level",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 6 },
          "id": 200,
          "panels": [],
          "title": "Pool Status & Capacity",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "text": "OFFLINE" }, "1": { "color": "green", "text": "ONLINE" } }, "type": "value" }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 4, "x": 0, "y": 7 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_pool_status{status=\"online\"}", "legendFormat": "{{pool}}", "refId": "A" }
          ],
          "title": "Pool Status",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 90 }] },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 4, "y": 7 },
          "id": 6,
          "options": { "minVizHeight": 75, "minVizWidth": 75, "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_pool_used_bytes / (truenas_pool_used_bytes + truenas_pool_available_bytes) * 100", "legendFormat": "{{pool}}", "refId": "A" }
          ],
          "title": "Pool Usage %",
          "type": "gauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 20, "gradientMode": "none", "hideFrom": { "legend": false, "tooltip": false, "viz": false }, "lineInterpolation": "smooth", "lineWidth": 2, "pointSize": 5, "scaleDistribution": { "type": "linear" }, "showPoints": "never", "spanNulls": false, "stacking": { "group": "A", "mode": "none" }, "thresholdsStyle": { "mode": "off" } },
              "mappings": [],
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 14, "x": 10, "y": 7 },
          "id": 7,
          "options": { "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_pool_used_bytes", "legendFormat": "{{pool}} used", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_pool_available_bytes", "legendFormat": "{{pool}} available", "refId": "B" }
          ],
          "title": "Pool Capacity",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 15 },
          "id": 300,
          "panels": [],
          "title": "Dataset & Zvol",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "inspect": false },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Used" }, "properties": [{ "id": "unit", "value": "bytes" }] },
              { "matcher": { "id": "byName", "options": "Available" }, "properties": [{ "id": "unit", "value": "bytes" }] },
              { "matcher": { "id": "byName", "options": "Quota" }, "properties": [{ "id": "unit", "value": "bytes" }] }
            ]
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "id": 8,
          "options": { "cellHeight": "sm", "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Used" }] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_dataset_used_bytes", "format": "table", "instant": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_dataset_available_bytes", "format": "table", "instant": true, "refId": "B" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_dataset_quota_bytes", "format": "table", "instant": true, "refId": "C" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_dataset_compressratio", "format": "table", "instant": true, "refId": "D" }
          ],
          "title": "Dataset Usage",
          "transformations": [
            { "id": "seriesToColumns", "options": { "byField": "dataset" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Time 1": true, "Time 2": true, "Time 3": true, "Time 4": true, "__name__": true, "__name__ 1": true, "__name__ 2": true, "__name__ 3": true, "__name__ 4": true, "instance": true, "instance 1": true, "instance 2": true, "instance 3": true, "instance 4": true, "job": true, "job 1": true, "job 2": true, "job 3": true, "job 4": true, "type 1": true, "type 2": true, "type 3": true, "type 4": true }, "renameByName": { "Value #A": "Used", "Value #B": "Available", "Value #C": "Quota", "Value #D": "Compress Ratio", "dataset": "Dataset", "type": "Type" } } }
          ],
          "type": "table"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "mappings": [],
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 26 },
          "id": 9,
          "options": { "barRadius": 0, "barWidth": 0.8, "fullHighlight": false, "groupWidth": 0.7, "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" }, "orientation": "horizontal", "showValue": "auto", "stacking": "none", "tooltip": { "mode": "single", "sort": "none" }, "xTickLabelRotation": 0 },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "topk(10, truenas_dataset_used_bytes)", "legendFormat": "{{dataset}}", "instant": true, "refId": "A" }
          ],
          "title": "Top Datasets by Usage",
          "type": "barchart"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 1 }, { "color": "green", "value": 1.5 }] },
              "decimals": 2
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 26 },
          "id": 10,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_dataset_compressratio", "legendFormat": "{{dataset}}", "refId": "A" }
          ],
          "title": "Compression Ratio",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 36 },
          "id": 11,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_zvol_volsize_bytes", "legendFormat": "{{zvol}}", "refId": "A" }
          ],
          "title": "Zvol Sizes",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 42 },
          "id": 400,
          "panels": [],
          "title": "iSCSI",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 43 },
          "id": 12,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_iscsi_sessions_active", "refId": "A" }
          ],
          "title": "Active Sessions",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "inspect": false },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 18, "x": 6, "y": 43 },
          "id": 13,
          "options": { "cellHeight": "sm", "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false }, "showHeader": true },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_iscsi_session_info", "format": "table", "instant": true, "refId": "A" }
          ],
          "title": "Session Details",
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Value": true, "__name__": true, "instance": true, "job": true }, "renameByName": { "initiator": "Initiator", "target": "Target" } } }
          ],
          "type": "table"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "inspect": false },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Enabled" }, "properties": [{ "id": "mappings", "value": [{ "options": { "0": { "color": "red", "text": "No" }, "1": { "color": "green", "text": "Yes" } }, "type": "value" }] }, { "id": "custom.cellOptions", "value": { "type": "color-text" } }] }
            ]
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 49 },
          "id": 14,
          "options": { "cellHeight": "sm", "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false }, "showHeader": true },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_iscsi_target_info", "format": "table", "instant": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_iscsi_extent_enabled", "format": "table", "instant": true, "refId": "B" }
          ],
          "title": "Targets & Extents",
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Time 1": true, "Time 2": true, "__name__": true, "__name__ 1": true, "__name__ 2": true, "instance": true, "instance 1": true, "instance 2": true, "job": true, "job 1": true, "job 2": true, "Value #A": true }, "renameByName": { "Value #B": "Enabled", "disk": "Disk", "id": "ID", "name": "Name", "name 1": "Target Name", "name 2": "Extent Name" } } }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 55 },
          "id": 500,
          "panels": [],
          "title": "Disks",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 70,
              "min": 0,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 40 }, { "color": "red", "value": 50 }] },
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 10, "x": 0, "y": 56 },
          "id": 15,
          "options": { "minVizHeight": 75, "minVizWidth": 75, "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_disk_temperature_celsius", "legendFormat": "{{disk}}", "refId": "A" }
          ],
          "title": "Disk Temperature",
          "type": "gauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "inspect": false },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Size" }, "properties": [{ "id": "unit", "value": "bytes" }] },
              { "matcher": { "id": "byName", "options": "Temperature" }, "properties": [{ "id": "unit", "value": "celsius" }] }
            ]
          },
          "gridPos": { "h": 8, "w": 14, "x": 10, "y": 56 },
          "id": 16,
          "options": { "cellHeight": "sm", "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false }, "showHeader": true, "sortBy": [{ "desc": false, "displayName": "Disk" }] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_disk_size_bytes", "format": "table", "instant": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "truenas_disk_temperature_celsius", "format": "table", "instant": true, "refId": "B" }
          ],
          "title": "Disk Info",
          "transformations": [
            { "id": "seriesToColumns", "options": { "byField": "disk" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Time 1": true, "Time 2": true, "__name__": true, "__name__ 1": true, "__name__ 2": true, "instance": true, "instance 1": true, "instance 2": true, "job": true, "job 1": true, "job 2": true, "model 2": true, "serial 2": true }, "renameByName": { "Value #A": "Size", "Value #B": "Temperature", "disk": "Disk", "model": "Model", "model 1": "Model", "serial": "Serial", "serial 1": "Serial" } } }
          ],
          "type": "table"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["truenas", "infrastructure"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "queryValue": "",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "Asia/Tokyo",
      "title": "TrueNAS",
      "uid": "truenas-overview",
      "version": 1
    }
