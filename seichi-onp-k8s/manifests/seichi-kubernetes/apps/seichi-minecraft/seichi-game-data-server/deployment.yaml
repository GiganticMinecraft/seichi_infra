apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: seichi-minecraft
  labels:
    app: seichi-game-data-server
  name: seichi-game-data-server
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: seichi-game-data-server
  template:
    metadata:
      labels:
        app: seichi-game-data-server
    spec:
      containers:
        - resources:
            requests:
              memory: 128Mi

          envFrom:
            - configMapRef:
                name: seichi-game-data-server-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb
                  key: mcserver-password

          # Track the rolling :master tag so Argo Image Updater can swap
          # digests in. Per-commit pinning happens by setting a sha- tag here
          # if you ever need to roll back (and disabling Image Updater for
          # this image temporarily).
          image: ghcr.io/giganticminecraft/seichi-game-data-server:master@sha256:e88df5a3185322b5023adbe8b8eb827c315eb4ba7140b16b7666487110b6deae
          imagePullPolicy: Always
          name: seichi-game-data-server
          ports:
            - containerPort: 80
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            tcpSocket:
              port: 80
            # 最大30秒待つ
            failureThreshold: 6
            periodSeconds: 5
