apiVersion: apps/v1
kind: Deployment
metadata:
  name: babyrite
  namespace: seichi-minecraft
  labels:
    app: babyrite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: babyrite
  template:
    metadata:
      labels:
        app: babyrite
    spec:
      containers:
        - name: babyrite
          image: ghcr.io/m1sk9/babyrite:v1.1.5
          resources:
            requests:
              cpu: 15m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: babyrite-config-volume
              mountPath: /config
          env:
              # 相対パスを指定する
            - name: CONFIG_FILE_PATH
              value: "config/config.toml"
            - name: DISCORD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: babyrite-discord-token
                  key: BABYRITE_DISCORD_TOKEN
      volumes:
        - name: babyrite-config-volume
          configMap:
            name: babyrite-config
