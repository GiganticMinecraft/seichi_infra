apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: backup--mariadb-all-databases
  namespace: seichi-minecraft
spec:
  schedule: "0 4 * * *"
  timezone: Asia/Tokyo
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  workflowSpec:
    workflowTemplateRef:
      name: backup--mariadb-all-databases
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: backup--mariadb-all-databases
  namespace: seichi-minecraft
  annotations:
    workflows.argoproj.io/description: "Namespace内の全Database CRDを対象に、各.spec.databaseを指定してBackup CRを作成する"
spec:
  serviceAccountName: mariadb-workflow-sa
  activeDeadlineSeconds: 7200 # 2時間でタイムアウト（image pullの失敗等での長時間ハングを防ぐ）
  onExit: notify-on-failure
  entrypoint: default
  templates:
    - name: default
      steps:
        - - name: check-maintenance-mode
            template: check-maintenance-mode
        - - name: generate-timestamp
            template: get-timestamp
        - - name: list-databases
            template: list-databases
        - - name: backup-each-database
            template: backup-single
            arguments:
              parameters:
                - name: name
                  value: "{{item}}"
                - name: timestamp
                  value: "{{steps.generate-timestamp.outputs.result}}"
            withParam: "{{steps.list-databases.outputs.result}}"
        - - name: cleanup-old-backups
            template: cleanup-old-backups

    - name: check-maintenance-mode
      script:
        image: alpine/kubectl:1.35.2
        command: [sh]
        source: |
          set -e
          MAINTENANCE_ENABLED=$(kubectl get configmap maintenance-mode -n seichi-minecraft -o jsonpath='{.data.enabled}' 2>/dev/null || echo "false")
          if [ "$MAINTENANCE_ENABLED" = "true" ]; then
            echo "メンテナンスモードが有効です。バックアップワークフローをスキップします。"
            exit 1
          fi
          echo "メンテナンスモードは無効です。バックアップを続行します。"

    - name: get-timestamp
      script:
        image: alpine/kubectl:1.35.2
        command: [sh]
        source: |
          date +%Y%m%d-%H%M%S

    - name: list-databases
      script:
        image: alpine/kubectl:1.35.2
        command: [sh]
        source: |
          kubectl get databases.k8s.mariadb.com -n "$TARGET_NAMESPACE" -o jsonpath='{.items[*].metadata.name}' \
            | tr ' ' '\n' \
            | awk 'NF {printf "%s\"%s\"", (NR>1 ? "," : ""), $0} END {print ""}' \
            | awk '{print "[" $0 "]"}'
        env:
          - name: TARGET_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace

    - name: backup-single
      inputs:
        parameters:
          - name: name
          - name: timestamp
      script:
        image: alpine/kubectl:1.35.2
        command: [sh]
        source: |
          set -e
          NAME="{{inputs.parameters.name}}"
          TIMESTAMP="{{inputs.parameters.timestamp}}"
          NAMESPACE="$TARGET_NAMESPACE"

          MARIA_DB_REF=$(kubectl get databases.k8s.mariadb.com "$NAME" -n "$NAMESPACE" -o jsonpath='{.spec.mariaDbRef.name}')
          DB_NAME=$(kubectl get databases.k8s.mariadb.com "$NAME" -n "$NAMESPACE" -o jsonpath='{.spec.name}')

          if [ -z "$MARIA_DB_REF" ] || [ -z "$DB_NAME" ]; then
            echo "spec.mariaDbRef.name or spec.name が定義されていません！"
            exit 1
          fi

          BACKUP_NAME="${NAME}-backup--${TIMESTAMP}"
          echo "Backup作成中: ${BACKUP_NAME} for MariaDB instance '${MARIA_DB_REF}', DB '${DB_NAME}'"

          cat <<MANIFEST | kubectl apply -f -
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Backup
          metadata:
            name: ${BACKUP_NAME}
            namespace: ${NAMESPACE}
          spec:
            mariaDbRef:
              name: ${MARIA_DB_REF}
            databases:
              - ${DB_NAME}
            storage:
              s3:
                bucket: mariadb-backups
                prefix: "database--${NAME}"
                endpoint: garage.garage.svc.cluster.local:3900
                region: seichi-cloud
                accessKeyIdSecretKeyRef:
                  name: garage-s3-credentials
                  key: AWS_ACCESS_KEY_ID
                secretAccessKeySecretKeyRef:
                  name: garage-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
          MANIFEST

          echo "成功: ${BACKUP_NAME}"
        env:
          - name: TARGET_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace

    - name: cleanup-old-backups
      script:
        image: alpine/kubectl:1.35.2
        command: [sh]
        source: |
          set -e
          NAMESPACE="$TARGET_NAMESPACE"
          RETENTION_DAYS=3
          CUTOFF=$(date -u -d "${RETENTION_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-${RETENTION_DAYS}d +%Y-%m-%dT%H:%M:%SZ)

          echo "=== ${RETENTION_DAYS}日より古いBackup CRを削除します (cutoff: ${CUTOFF}) ==="

          kubectl get backups.k8s.mariadb.com -n "$NAMESPACE" \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.metadata.creationTimestamp}{"\n"}{end}' \
          | while IFS="$(printf '\t')" read -r NAME CREATED; do
            if [ -z "$NAME" ] || [ -z "$CREATED" ]; then
              continue
            fi
            if [ "$CREATED" \< "$CUTOFF" ]; then
              kubectl delete backups.k8s.mariadb.com "$NAME" -n "$NAMESPACE" && {
                DELETED=$((DELETED + 1))
                echo "削除: ${NAME} (created: ${CREATED})"
              } || {
                echo "削除失敗: ${NAME}"
              }
            fi
          done

          echo "=== クリーンアップ完了 ==="
        env:
          - name: TARGET_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace

    - name: notify-on-failure
      steps:
        - - name: send-failure-notification
            template: send-discord-notification
            when: "{{workflow.status}} != Succeeded"

    - name: send-discord-notification
      container:
        image: curlimages/curl:8.18.0
        env:
          - name: DISCORD_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: backup-failure-notify-webhook
                key: DISCORD_WEBHOOK_URL
        command: [sh, -ceu]
        args:
          - |
            curl -fSs -X POST \
              -H "Content-Type: application/json" \
              --data "{
                \"content\": \"<@&532704116799963168>\",
                \"allowed_mentions\": {\"roles\": [\"532704116799963168\"]},
                \"embeds\": [{
                  \"title\": \"mariadb バックアップ失敗\",
                  \"description\": \"バックアップワークフローが失敗しました。ArgoWorkflows を確認してください。\",
                  \"color\": 15548997
                }]
              }" \
              "${DISCORD_WEBHOOK_URL}"
