apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  namespace: seichi-minecraft
  name: mariadb
spec:
  tls:
    enabled: false
  rootPasswordSecretKeyRef:
    name: mariadb
    generate: false
    key: root-password

  image: docker-registry1.mariadb.com/library/mariadb:11.8
  imagePullPolicy: IfNotPresent

  port: 3306

  storage:
    size: 500Gi
    storageClassName: synology-iscsi-storage
    resizeInUseVolumes: true
    waitForVolumeResize: true

  myCnf: |
    [mariadb]
    slow_query_log=true
    slow_query_log-file=/var/log/mysql/mysql-slow.log
    long_query_time=0.1
    innodb_buffer_pool_size = 8G
    innodb_log_file_size = 512M
    innodb_flush_log_at_trx_commit = 2
    innodb_write_io_threads = 8
    innodb_io_capacity = 1000
    innodb_io_capacity_max = 3000
    max_allowed_packet = 256M
    performance_schema=on
    performance_schema_instrument='memory/%=ON'
    max-connections=400
    join_buffer_size=256K

  resources:
    requests:
      cpu: 2
      memory: 16Gi
    limits:
      cpu: 4
      memory: 16Gi

  env:
    - name: TZ
      value: SYSTEM
    # glibc malloc は thread-per-connection ワークロードで arena 断片化を起こし、
    # buffer pool (8G) を大きく超えて RSS が膨れ上がる。
    # 公式 image に同梱されている jemalloc に切り替えて RSS を抑える。
    # 実測では RSS が limit (16Gi) の 96% 超まで張り付いていた。
    - name: LD_PRELOAD
      value: /usr/lib/x86_64-linux-gnu/libjemalloc.so.2

  # slow log をファイル (/var/log/mysql/mysql-slow.log) から sidecar 経由で
  # stdout に流すための emptyDir。mariadb-operator は spec.volumes / spec.volumeMounts を
  # primary container と sidecar container の両方に自動伝播するため、sidecar 側で
  # 同じ mountPath を書くと "must be unique" エラーになる。
  # sizeLimit: MariaDB slow log は自動ローテーションされない。実測 ~230 KB/h なので
  # 500Mi = ~3 ヶ月分。想定外の増加でノードの ephemeral storage を巻き込む前に
  # Pod が eviction される上限として設定する。
  volumes:
    - name: slow-log
      emptyDir:
        sizeLimit: 500Mi
  volumeMounts:
    - name: slow-log
      mountPath: /var/log/mysql

  sidecarContainers:
    # MariaDB は slow log を stdout に書けない (MDEV-26625、/dev/stderr は権限降格後に open 不可)
    # ため、ファイル → 共有 emptyDir → sidecar tail → stdout という経路で
    # kubelet の pod log 回収経路に乗せ、Alloy が拾えるようにする。
    #
    # tail はデフォルトの末尾から開始 ("-n +1" を付けない)。sidecar 再起動時に
    # 既存 slow log を先頭から再送してしまうと Loki 側で重複ストリームになり、
    # loki_process_custom_mariadb_slow_query_seconds_* の累積値が歪む。
    # 初回起動時の数百 ms 分の slow log は失うが、mariadb 起動直後の
    # ウォームアップクエリは運用上重要ではないのでそのトレードオフを受け入れる。
    - name: slow-log-tailer
      image: busybox:1.37.0
      # mariadb-operator は spec.env を primary と sidecar の両方に伝播する。
      # primary 用の LD_PRELOAD=jemalloc が busybox sidecar にも適用されると、
      # jemalloc が無いため ld.so が "cannot be preloaded" と毎プロセス ERROR 行を
      # stdout に吐き、Alloy の multiline パイプラインに紛れ込んで slow log を汚す。
      # sidecar 側で空に上書きして無効化する。
      env:
        - name: LD_PRELOAD
          value: ""
      command: ["/bin/sh", "-c"]
      args:
        - |
          until [ -f /var/log/mysql/mysql-slow.log ]; do sleep 1; done
          exec tail -F /var/log/mysql/mysql-slow.log
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi

  podSecurityContext:
    runAsUser: 0

  securityContext:
    allowPrivilegeEscalation: false

  serviceAccountName: mariadb

  livenessProbe:
    exec:
      command:
        - bash
        - -c
        - mariadb -u root -p"${MARIADB_ROOT_PASSWORD}" -e "SELECT 1;"
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 5

  readinessProbe:
    exec:
      command:
        - bash
        - -c
        - mariadb -u root -p"${MARIADB_ROOT_PASSWORD}" -e "SELECT 1;"
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 5

  updateStrategy:
    autoUpdateDataPlane: false
    type: ReplicasFirstPrimaryLast

  metrics:
    enabled: true
    exporter:
      args:
        - "--collect.perf_schema.eventsstatements"
        - "--collect.perf_schema.eventsstatements.digest_text_limit=200"
        - "--collect.perf_schema.eventsstatements.limit=250"
        - "--collect.perf_schema.memory_events"
        - "--collect.perf_schema.tableiowaits"
        - "--collect.perf_schema.indexiowaits"
        - "--collect.info_schema.tables"
    serviceMonitor:
      prometheusRelease: prometheus
