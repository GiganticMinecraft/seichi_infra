apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-approval-bot
  namespace: seichi-minecraft
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: tailscale-approval-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-approval-bot
  template:
    metadata:
      labels:
        app: tailscale-approval-bot
    spec:
      containers:
        - name: tailscale-approval-api
          image: "ghcr.io/giganticminecraft/tailscale-approval-bot/api:sha-20d7a09@sha256:f2a1ad732ad2ab50681ec64f0ecf061b063705294a205cace8589b79dc476e5a"
          ports:
            - containerPort: 8080
          env:
            - name: TAILSCALE_TAILNET
              valueFrom:
                secretKeyRef:
                  name: tailscale-approval-bot-secrets
                  key: TAILSCALE_TAILNET
            - name: TAILSCALE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-approval-bot-secrets
                  key: TAILSCALE_API_KEY
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: tailscale-approval-discord
          image: "ghcr.io/giganticminecraft/tailscale-approval-bot/discord:sha-20d7a09@sha256:47835d10125e28ec0858023333a64f092d6ad26ed06f94e9688b0e2bed2129ed"
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tailscale-approval-bot-secrets
                  key: DISCORD_BOT_TOKEN
            - name: DISCORD_GUILD_ID
              valueFrom:
                secretKeyRef:
                  name: tailscale-approval-bot-secrets
                  key: DISCORD_GUILD_ID
            - name: DISCORD_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: tailscale-approval-bot-secrets
                  key: DISCORD_CHANNEL_ID
            - name: API_URL
              value: "http://localhost:8080"
            - name: POLL_INTERVAL
              value: "24h"
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
