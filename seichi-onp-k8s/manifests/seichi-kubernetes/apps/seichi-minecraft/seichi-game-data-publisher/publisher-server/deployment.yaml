apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: seichi-game-data-publisher-server
  name: seichi-game-data-publisher-server
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: seichi-game-data-publisher-server
  template:
    metadata:
      labels:
        app: seichi-game-data-publisher-server
    spec:
      containers:
        - resources:
            requests:
              cpu: 20m
              memory: 512Mi
            limits:
              cpu: 50m
              memory: 768Mi

          envFrom:
            - configMapRef:
                name: seichi-game-data-publisher-server

          image: ghcr.io/giganticminecraft/seichi-game-data-publisher:sha-745211e
          name: seichi-game-data-publisher-server
          ports:
            - containerPort: 80
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            tcpSocket:
              port: 80
            # 最大30秒待つ
            failureThreshold: 6
            periodSeconds: 5
