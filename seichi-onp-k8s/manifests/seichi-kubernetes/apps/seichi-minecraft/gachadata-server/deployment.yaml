apiVersion: apps/v1
kind: Deployment
metadata:
  name: gachadata-server
  namespace: seichi-minecraft
  labels:
    app: gachadata-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gachadata-server
  template:
    metadata:
      labels:
        app: gachadata-server
    spec:
      containers:
        - name: gachadata-server
          image: ghcr.io/giganticminecraft/gachadata-server:sha-23f6394@sha256:49030b16f117fad17228ada213bdce3e10bad7bbea26ffeb005e9eb53ec70762
          resources:
            requests:
              cpu: 15m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          env:
            - name: MYSQL_USER
              value: mcserver
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb
                  key: mcserver-password
            - name: MYSQL_HOST
              value: "mariadb"
            - name: MYSQL_PORT
              value: "3306"
            - name: HTTP_PORT
              value: "80"
