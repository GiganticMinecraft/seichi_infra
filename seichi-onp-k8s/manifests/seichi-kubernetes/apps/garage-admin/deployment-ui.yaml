apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-admin-ui
  labels:
    app: garage-admin-ui
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: garage-admin-ui
  template:
    metadata:
      labels:
        app: garage-admin-ui
    spec:
      containers:
        - name: garage-admin-ui
          image: ghcr.io/giganticminecraft/garage-admin-console-frontend:sha-af22c9a@sha256:460978c72409b3127ac912af5ad81fed33eff5b5e0153c62383b7a245fb23bb8
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 6
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 30
      volumes:
        - name: nginx-conf
          configMap:
            name: garage-admin-ui-nginx-conf
