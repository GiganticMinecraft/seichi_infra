# policyAuditMode の動作検証用。
# ingressDeny/egressDeny は allow ポリシーより常に優先される。
# policyAuditMode が有効な間は実際のドロップは発生せず、
# audit-denied として Hubble メトリクスに記録される。
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-all
spec:
  endpointSelector: {}
  ingressDeny:
    - fromEntities:
        - "all"
  egressDeny:
    - toEntities:
        - "all"
