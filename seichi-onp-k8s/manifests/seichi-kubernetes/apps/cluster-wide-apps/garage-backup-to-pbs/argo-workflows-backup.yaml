apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: backup--garage-to-pbs
  namespace: garage
spec:
  schedules:
    - "0 10 * * *"
  timezone: Asia/Tokyo
  concurrencyPolicy: "Forbid"
  workflowSpec:
    workflowTemplateRef:
      name: backup--garage-to-pbs
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: backup--garage-to-pbs
  namespace: garage
  annotations:
    workflows.argoproj.io/description: "GarageのデータをS3 API経由でダンプし、Proxmox Backup Serverにバックアップするワークフロー"
spec:
  serviceAccountName: garage-workflow-sa
  ttlStrategy:
    secondsAfterCompletion: 86400
  activeDeadlineSeconds: 28800
  onExit: notify-on-failure
  entrypoint: default
  templates:
    - name: default
      steps:
        - - name: run-backup
            template: run-backup

    - name: run-backup
      script:
        image: debian:13
        command: ["/bin/sh", "-c"]
        source: |
          set -e

          echo "=== Installing dependencies ==="
          apt-get update
          apt-get install -y curl unzip

          # AWS CLI のインストール
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install
          rm -rf /tmp/awscliv2.zip /tmp/aws

          # Proxmox Backup Client のインストール
          echo "deb http://download.proxmox.com/debian/pbs-client trixie main" > /etc/apt/sources.list.d/pbs-client.list
          curl -fsSL https://enterprise.proxmox.com/debian/proxmox-release-trixie.gpg -o /etc/apt/trusted.gpg.d/proxmox-release-trixie.gpg
          apt-get update
          apt-get install -y proxmox-backup-client

          echo "=== Dumping all Garage buckets via S3 API ==="
          date

          S3_OPTS="--endpoint-url http://garage.garage.svc.cluster.local:3900 --region seichi-cloud"
          DUMP_DIR="/data/garage-dump"
          mkdir -p "$DUMP_DIR"

          # バックアップ対象から除外するバケット（肥大化が激しく PBS バックアップに
          # 不向きなログ系。除外したバケットの dump ディレクトリは下の prune 処理で削除される）
          EXCLUDE_BUCKETS="loki"

          # バケット一覧を取得し、除外対象を除いてそれぞれ sync
          ALL_BUCKETS=$(aws $S3_OPTS s3 ls | awk '{print $3}')
          BUCKETS=""
          for b in $ALL_BUCKETS; do
            excluded=0
            for ex in $EXCLUDE_BUCKETS; do
              if [ "$b" = "$ex" ]; then
                excluded=1
                break
              fi
            done
            if [ "$excluded" = 1 ]; then
              echo "Excluding bucket from backup: $b"
              continue
            fi
            BUCKETS="$BUCKETS $b"
          done
          echo "Found buckets: $BUCKETS"

          # 永続 PVC 上に Garage から削除済み、またはバックアップ対象外となった
          # バケットのディレクトリが残ると不要なデータを PBS に送り続けることになるため、
          # sync 前に掃除する（BUCKETS に無いディレクトリ＝loki 等の除外バケットも削除される）
          echo "=== Pruning orphaned bucket directories ==="
          for dir in "$DUMP_DIR"/*/; do
            [ -d "$dir" ] || continue
            existing=$(basename "$dir")
            found=0
            for b in $BUCKETS; do
              if [ "$b" = "$existing" ]; then
                found=1
                break
              fi
            done
            if [ "$found" = 0 ]; then
              echo "Removing orphaned directory: $dir"
              # 巨大ディレクトリ(例: Loki の数十万エントリ)では rm -rf が
              # ENOTEMPTY(Directory not empty) で失敗することがある。これは rm が
              # getdents64 によるディレクトリ読み出しと unlink を交互に行う過程で、
              # ext4 htree のハッシュベースのカーソルが削除によってずれ、一部
              # エントリを読み飛ばしたまま end-of-directory に達し、最後の rmdir 時に
              # 中身が残っているために起きる(POSIX 的にも readdir 中の更新は unspecified)。
              # 縮んだディレクトリを読み直せば残りを消せるため、空になるまでリトライする。
              # また prune は best-effort な後始末なので、消し切れなくても
              # バックアップ本体は止めない(rm を && の左に置くことで set -e でも中断しない)。
              n=0
              while [ -d "$dir" ] && [ "$n" -lt 10 ]; do
                n=$((n + 1))
                rm -rf "$dir" && break
                echo "  prune retry $n: $dir"
              done
              [ -d "$dir" ] && echo "  WARNING: $dir を完全に削除できませんでした(次回実行時に再試行されます)"
            fi
          done

          for bucket in $BUCKETS; do
            echo "--- Syncing bucket: $bucket ---"
            mkdir -p "$DUMP_DIR/$bucket"
            aws $S3_OPTS s3 sync "s3://$bucket" "$DUMP_DIR/$bucket" --delete
            echo "Bucket $bucket synced at $(date)"
          done

          echo "=== S3 dump complete ==="
          du -sh "$DUMP_DIR"/*
          date

          echo "=== Running PBS backup ==="
          proxmox-backup-client backup "${BACKUP_NAME}" \
            --repository "${PBS_USER}@${PBS_HOST}:${PBS_DATASTORE}" \
            --backup-id "${BACKUP_ID}"

          echo "=== Backup complete ==="
          date
        env:
          - name: TZ
            value: "Asia/Tokyo"
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: garage-backup-s3-credentials
                key: AWS_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: garage-backup-s3-credentials
                key: AWS_SECRET_ACCESS_KEY
          - name: BACKUP_NAME
            value: "data.pxar:/data/garage-dump"
          - name: BACKUP_ID
            value: "garage"
          - name: PBS_USER
            valueFrom:
              secretKeyRef:
                name: pbs-credentials
                key: user
          - name: PBS_HOST
            valueFrom:
              secretKeyRef:
                name: pbs-credentials
                key: host
          - name: PBS_DATASTORE
            valueFrom:
              secretKeyRef:
                name: pbs-credentials
                key: datastore
          - name: PBS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pbs-credentials
                key: password
          - name: PBS_FINGERPRINT
            valueFrom:
              secretKeyRef:
                name: pbs-credentials
                key: fingerprint
        volumeMounts:
          - name: dump-volume
            mountPath: /data
          - name: pbs-tmpfs
            mountPath: /root/.cache
    - name: notify-on-failure
      steps:
        - - name: send-failure-notification
            templateRef:
              name: backup-failure-notification
              template: send-discord-notification
              clusterScope: true
            when: "{{workflow.status}} != Succeeded"
            arguments:
              parameters:
                - name: title
                  value: "garage バックアップ失敗"

  volumes:
    - name: dump-volume
      persistentVolumeClaim:
        claimName: garage-backup-dump
    - name: pbs-tmpfs
      emptyDir: {}
