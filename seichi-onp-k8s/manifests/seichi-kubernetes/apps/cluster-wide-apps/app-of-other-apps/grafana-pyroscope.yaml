apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pyroscope
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # cascade deletion on this App deletion
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: cluster-wide-apps
  source:
    chart: pyroscope
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 2.0.2
    helm:
      values: |
        # chart-native の v1/v2 切替 knob。
        # この knob を立てると chart 側が write-path=segment-writer や
        # enable-query-backend 等の関連フラグ群を内部で組み立てる。
        # extraArgs に -architecture.storage=v2 を直接渡すと不整合が起きる。
        architecture:
          storage:
            v1: false
            v2: true

        # chart 同梱の Alloy (StatefulSet pyroscope-alloy) を無効化。
        # profile 収集は k8s-monitoring chart の alloy-profiles に一本化する。
        # 両方有効だと同じ Pod の /debug/pprof/profile を二重 scrape して
        # "cpu profiling already in use" で片方が 500 で落ちる。
        # k8s-monitoring 側は cpu/memory/goroutine/block/mutex/fgprof/java/ebpf
        # を annotation ベースで網羅しており、同梱 Alloy の機能を完全にカバー済。
        alloy:
          enabled: false

        pyroscope:
          # v2 アーキテクチャ: profile を Garage (S3 互換) に直接書き込むため
          # ローカル PVC は不要。chart デフォルトでも false だが意図を明示する。
          persistence:
            enabled: false

          # Pyroscope 自身への自己 scrape を停止。
          # chart デフォルトは pyroscope Pod に
          # profiles.grafana.com/{cpu,memory,goroutine}.scrape="true" を付与し、
          # 同クラスタの alloy-profiles が 15s 間隔で自分を scrape する。
          # distributor の received_compressed_bytes_sum を type 別に集計したところ、
          # goroutine + mutex + block (= Pyroscope 自身しか出せない種別) だけで
          # 全受信量の 45% を占めていたため、自己 scrape を無効化する。
          # 既存キー (port_name, service_git_ref 等) は helm の map merge で残る。
          podAnnotations:
            profiles.grafana.com/cpu.scrape: "false"
            profiles.grafana.com/memory.scrape: "false"
            profiles.grafana.com/goroutine.scrape: "false"

          extraArgs:
            # structuredConfig 内の ${VAR} を環境変数で展開させる
            config.expand-env: "true"
            # architecture.storage=v2 では write-path=segment-writer も必須だが
            # chart 2.0.1 は v2 を立てても write-path を自動セットしない (確認済)。
            # 起動時に "write-path=segment-writer is required for v2 storage layer"
            # で fatal するため明示する。
            write-path: segment-writer

          extraCustomEnvVars:
            - name: GARAGE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-pyroscope-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: GARAGE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-pyroscope-credentials
                  key: AWS_SECRET_ACCESS_KEY

          structuredConfig:
            storage:
              backend: s3
              s3:
                endpoint: garage.garage.svc.cluster.local:3900
                bucket_name: pyroscope
                region: seichi-cloud
                access_key_id: ${GARAGE_S3_ACCESS_KEY_ID}
                secret_access_key: ${GARAGE_S3_SECRET_ACCESS_KEY}
                insecure: true
                force_path_style: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
