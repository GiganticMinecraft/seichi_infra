apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pyroscope
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # cascade deletion on this App deletion
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: cluster-wide-apps
  source:
    chart: pyroscope
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 2.0.1
    helm:
      values: |
        # chart-native の v1/v2 切替 knob。
        # この knob を立てると chart 側が write-path=segment-writer や
        # enable-query-backend 等の関連フラグ群を内部で組み立てる。
        # extraArgs に -architecture.storage=v2 を直接渡すと不整合が起きる。
        architecture:
          storage:
            v1: false
            v2: true

        pyroscope:
          # v2 アーキテクチャ: profile を Garage (S3 互換) に直接書き込むため
          # ローカル PVC は不要。chart デフォルトでも false だが意図を明示する。
          persistence:
            enabled: false

          extraArgs:
            # structuredConfig 内の ${VAR} を環境変数で展開させる
            config.expand-env: "true"
            # architecture.storage=v2 では write-path=segment-writer も必須だが
            # chart 2.0.1 は v2 を立てても write-path を自動セットしない (確認済)。
            # 起動時に "write-path=segment-writer is required for v2 storage layer"
            # で fatal するため明示する。
            write-path: segment-writer

          extraCustomEnvVars:
            - name: GARAGE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-pyroscope-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: GARAGE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-pyroscope-credentials
                  key: AWS_SECRET_ACCESS_KEY

          structuredConfig:
            storage:
              backend: s3
              s3:
                endpoint: garage.garage.svc.cluster.local:3900
                bucket_name: pyroscope
                region: seichi-cloud
                access_key_id: ${GARAGE_S3_ACCESS_KEY_ID}
                secret_access_key: ${GARAGE_S3_SECRET_ACCESS_KEY}
                insecure: true
                force_path_style: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
