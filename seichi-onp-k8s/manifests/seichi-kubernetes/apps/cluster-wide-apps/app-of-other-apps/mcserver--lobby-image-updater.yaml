apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: mcserver--lobby
  namespace: argocd
spec:
  writeBackConfig:
    method: git:secret:argocd/argocd-applicationset-controller-github-app-secret
    gitConfig:
      branch: main
      pullRequest:
        github: {}
  applicationRefs:
    - namePattern: "seichi-minecraft-mcserver--lobby"
      images:
        - alias: minecraft
          imageName: ghcr.io/giganticminecraft/seichi_minecraft_server_production_lobby:1.0.0
          commonUpdateSettings:
            updateStrategy: digest
