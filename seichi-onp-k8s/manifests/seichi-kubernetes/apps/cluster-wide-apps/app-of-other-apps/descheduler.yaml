apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler
  namespace: argocd
spec:
  project: argocd-root
  source:
    chart: descheduler
    repoURL: https://kubernetes-sigs.github.io/descheduler/
    targetRevision: 0.36.0
    helm:
      releaseName: descheduler
      values: |
        # 毎朝 07:00 JST (kured の再起動窓 05:00-07:00 のクローズ直後) に実行する。
        # kured が 1 台ずつ drain + 再起動すると最後に再起動したノードが軽いまま残るため、
        # 窓が閉じて新規再起動が始まらなくなった直後・07:00-08:00 の ArgoCD selfHeal で
        # Minecraft の Pod が復元されるより前にならすことで、復元時には均された状態の
        # クラスタへ配置される。LowNodeUtilization は閾値 (20%/50%) を跨いだノードが
        # ある時しか動かないので、再起動がなかった日はほぼ no-op になる
        schedule: "0 7 * * *"
        timeZone: "Asia/Tokyo"
        # チャートのデフォルトポリシーをベースに、Pod の退避(=再起動)が
        # プレイヤー切断に直結する namespace を退避対象から除外する
        deschedulerPolicy:
          # 一度の実行で大量退避が起きないようにする安全弁
          maxNoOfPodsToEvictPerNode: 10
          profiles:
            - name: default
              pluginConfig:
                - name: DefaultEvictor
                  args:
                    # 退避先ノードが確保できない Pod は退避しない
                    nodeFit: true
                    podProtections:
                      defaultDisabled:
                        - "PodsWithLocalStorage"
                      extraEnabled:
                        - "PodsWithPVC"
                - name: RemoveDuplicates
                  args:
                    namespaces:
                      exclude: &player-facing-namespaces
                        - seichi-minecraft
                        - seichi-debug-minecraft
                        - seichi-gateway
                        - seichi-debug-gateway
                - name: RemovePodsHavingTooManyRestarts
                  args:
                    podRestartThreshold: 100
                    includingInitContainers: true
                    namespaces:
                      exclude: *player-facing-namespaces
                - name: RemovePodsViolatingNodeAffinity
                  args:
                    nodeAffinityType:
                      - requiredDuringSchedulingIgnoredDuringExecution
                    namespaces:
                      exclude: *player-facing-namespaces
                - name: RemovePodsViolatingNodeTaints
                  args:
                    namespaces:
                      exclude: *player-facing-namespaces
                - name: RemovePodsViolatingInterPodAntiAffinity
                  args:
                    namespaces:
                      exclude: *player-facing-namespaces
                - name: RemovePodsViolatingTopologySpreadConstraint
                  args:
                    namespaces:
                      exclude: *player-facing-namespaces
                - name: LowNodeUtilization
                  args:
                    thresholds:
                      cpu: 20
                      memory: 20
                      pods: 20
                    targetThresholds:
                      cpu: 50
                      memory: 50
                      pods: 50
                    # LowNodeUtilization は namespaces を受け付けないので
                    # evictableNamespaces で除外する
                    evictableNamespaces:
                      exclude: *player-facing-namespaces
              plugins:
                balance:
                  enabled:
                    - RemoveDuplicates
                    - RemovePodsViolatingTopologySpreadConstraint
                    - LowNodeUtilization
                deschedule:
                  enabled:
                    - RemovePodsHavingTooManyRestarts
                    - RemovePodsViolatingNodeTaints
                    - RemovePodsViolatingNodeAffinity
                    - RemovePodsViolatingInterPodAntiAffinity
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
