apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kured
  namespace: argocd
spec:
  project: cluster-wide-apps
  source:
    chart: kured
    repoURL: https://kubereboot.github.io/charts
    targetRevision: 6.1.0
    helm:
      releaseName: kured
      values: |
        configuration:
          timeZone: "Asia/Tokyo"
          # 04:00 からの Minecraft バックアップ(kubectl patch による replicas 操作)と
          # 07:00-08:00 の ArgoCD selfHeal ウィンドウを避けた時間帯のみ再起動を許可する
          startTime: "05:00"
          endTime: "07:00"
          # ロックにより同時に再起動するノードは 1 台のみ
          concurrency: 1
          # 再起動中にノードが死んだ場合にロックが残留しないようにする
          lockTtl: 30m
          drainGracePeriod: "60"
          drainTimeout: 10m
          period: 10m
          annotateNodes: true
          # 重要なアラートが firing している間は再起動を保留する。
          # 常時 firing しがちな警告(TargetDown 等)は除外しないと永久にブロックされるため列挙している
          prometheusUrl: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
          alertFiringOnly: true
          # KubeStatefulSetReplicasMismatch: pyroscope や debug 環境の redis が常時 firing しがちで、
          # 2026-07-15/16 の窓で全ノードの再起動を 2 日間ブロックした実績があるため、
          # 同クラスの KubeDeploymentReplicasMismatch / KubePodNotReady と同様に除外する
          alertFilterRegexp: "^(Watchdog|InfoInhibitor|TargetDown|KubeJobFailed|CPUThrottlingHigh|PrometheusNotConnectedToAlertmanagers|KubePodCrashLooping|KubePodNotReady|KubeDeploymentReplicasMismatch|KubeStatefulSetReplicasMismatch)$"
          # kubelet のパッチ更新も kured の drain + 再起動に相乗りさせる。
          # pkgs.k8s.io はマイナーごとの repo (core:/stable:/v1.3x) なので、apt で入るのは
          # 同一マイナー内のパッチのみ。マイナーアップグレードは従来どおり kubeadm で手動実施し、
          # その際に repo の向き先を張り替えれば以後のパッチ追従が自動で継続する。
          #
          # sentinel: OS の reboot-required に加えて kubelet の更新有無を apt のドライランで判定する
          # (コマンド指定時はファイル判定が無効になるため両方をここで見る)。
          # チャートは useRebootSentinelHostPath=true (デフォルト) だと rebootSentinelCommand を
          # 出力しないため、hostPath マウント方式を無効化して nsenter によるコマンド方式に切り替える
          useRebootSentinelHostPath: false
          # --allow-change-held-packages がないと hold 中の kubelet は simulate でも
          # 変更対象から外れて更新を検知できない
          rebootSentinelCommand: >-
            sh -c 'test -f /var/run/reboot-required ||
            apt-get -qq -s -o Debug::NoLocking=true --allow-change-held-packages
            --only-upgrade install kubelet 2>/dev/null
            | grep -q "^Inst kubelet"'
          # drain 完了後に実行される。node-runtime-updater がステージした containerd / runc を
          # apply.sh (rename のみ) で先に適用し、kubelet を unhold -> パッチ更新 -> hold
          # してから再起動する。すべての更新が drain 済み・再起動直前に適用される。
          #
          # kured の nsenter はホストの mount namespace にしか入らないため、apt は
          # ホストの resolv.conf (systemd-resolved の 127.0.0.53) を読みながら Pod の
          # network namespace で実行され、名前解決に失敗する (2026-07-17 の窓で
          # kubelet の .deb 取得が全ノード "Temporary failure resolving" で失敗した実績)。
          # そのためネットワークを要する apt 部分のみ nsenter --net でホストの
          # network namespace に入れて実行する (kured は privileged + hostPID なので可能)。
          #
          # 再起動窓 (05:00-07:00) は unattended-upgrades の実行時間帯と重なり apt lock を
          # 取り合う可能性があるため Lock::Timeout を設定し、apply や apt が失敗しても reboot は
          # 必ず実行する (ノードが drain されたまま残らないようにする。sentinel が残るため翌日リトライされる)
          rebootCommand: >-
            sh -c '{ [ ! -x /var/lib/node-runtime-updater/apply.sh ]
            || /var/lib/node-runtime-updater/apply.sh; } || true;
            nsenter --net=/proc/1/ns/net -- sh -c "export DEBIAN_FRONTEND=noninteractive;
            apt-mark unhold kubelet;
            apt-get -qq -o DPkg::Lock::Timeout=600 update;
            apt-get -qq -y -o DPkg::Lock::Timeout=600 --only-upgrade install kubelet;
            apt-mark hold kubelet";
            systemctl reboot'
        # tolerations はチャートのデフォルトで control-plane の NoSchedule を含むため未指定のままにする
        service:
          create: true
        metrics:
          create: true
          labels:
            release: prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
