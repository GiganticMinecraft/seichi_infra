apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster-wide-apps
  source:
    repoURL: https://github.com/deuxfleurs-org/garage.git
    targetRevision: v2.3.0
    path: script/helm/garage
    helm:
      releaseName: garage
      values: |
        garage:
          dbEngine: "lmdb"
          blockSize: "67108864" # 64MiB
          replicationFactor: "2"
          consistencyMode: "consistent"
          compressionLevel: "1"
          rpcBindAddr: "[::]:3901"
          kubernetesSkipCrd: false
          s3:
            api:
              region: "seichi-cloud"
              rootDomain: ".s3.garage.svc.cluster.local"
            web:
              rootDomain: ".web.garage.svc.cluster.local"
              index: "index.html"

        persistence:
          enabled: true
          meta:
            storageClass: "synology-iscsi-storage"
            size: 100Gi
          data:
            storageClass: "sc-truenas-03-iscsi"
            size: 4Ti

        deployment:
          kind: StatefulSet
          replicaCount: 3
          podManagementPolicy: OrderedReady

        # kured の drain の玉突きで 3 replica 中 2 つが同一 worker に同居し得る
        # (2026-07-20 の再起動窓で garage-1/2 が wk-1 に同居した実績)。
        # replicationFactor 2 + consistent は 1 ノード停止で書き込み quorum (2/2) を
        # 失うため、2 replica を同時に失う配置は S3 のほぼ全停止に直結する。
        # descheduler は PodsWithPVC 保護で PVC 持ち Pod を動かさないため同居は
        # 自然解消せず、required の anti-affinity で同居自体を禁止する。
        # worker 3 台にちょうど 3 replica なのでノード再起動中は退避先がなく
        # Pending で待つが、どのみち再起動中は 1 replica 欠けるため実害はない。
        # 適用時は Pod template の変更で STS がローリング更新され (1 台ずつ、
        # iSCSI 付け替えで各 1-3 分書き込み劣化)、同居中の replica は空いている
        # worker へ自動的に散る
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: garage
                    app.kubernetes.io/instance: garage
                topologyKey: kubernetes.io/hostname

        image:
          repository: dxflrs/amd64_garage
          pullPolicy: IfNotPresent

        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi

        environment:
          - name: GARAGE_ADMIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: garage-admin-api-token
                key: token

        monitoring:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              labels:
                release: prometheus
              interval: 30s
              scrapeTimeout: 10s
          tracing:
            sink: "http://k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4318"
  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
    # upstream チャートは rpcSecret 未指定だと render のたびに randAlphaNum で
    # 新しい値を生成する(ArgoCD では lookup が効かず既存値を保持できない)。
    # sync ごとに Secret が書き換わると、Pod が起動時に焼き込む rpc_secret が
    # Pod ごとに食い違い、クラスタ全体で handshake 不能になる
    # (2026-07-14 のノード再起動で顕在化し S3 が約 5 時間書き込み不能になった)。
    - kind: Secret
      name: garage-rpc-secret
      namespace: garage
      jsonPointers:
        - /data/rpcSecret
