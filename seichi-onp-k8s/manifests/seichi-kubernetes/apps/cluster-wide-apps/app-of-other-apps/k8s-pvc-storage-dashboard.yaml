apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-pvc-storage-dashboard
  namespace: argocd
spec:
  project: cluster-wide-apps
  source:
    repoURL: https://github.com/GiganticMinecraft/seichi_infra
    targetRevision: main
    path: seichi-onp-k8s/manifests/seichi-kubernetes/apps/cluster-wide-apps/k8s-pvc-storage-dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
