apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: cluster-wide-apps
  source:
    chart: kyverno
    repoURL: https://kyverno.github.io/kyverno/
    targetRevision: 3.7.1
    helm:
      releaseName: kyverno
      values: |
        admissionController:
          replicas: 3
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: prometheus
        backgroundController:
          replicas: 2
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: prometheus
        cleanupController:
          replicas: 2
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: prometheus
        reportsController:
          replicas: 2
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
