apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # cascade deletion on this App deletion
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: cluster-wide-apps
  source:
    chart: k8s-monitoring
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 4.0.1
    helm:
      values: |
        cluster:
          name: "seichi-cloud"

        destinations:
          localPrometheus:
            type: prometheus
            url: http://prometheus-kube-prometheus-prometheus:9090

          localLoki:
            type: loki
            url: http://loki-gateway:80/loki/api/v1/push

          localTempo:
            type: otlp
            url: http://tempo:4317
            tls:
              insecure: true
            metrics:
              enabled: false
            logs:
              enabled: false
            traces:
              enabled: true

          localPyroscope:
            type: pyroscope
            url: http://pyroscope:4040

        clusterMetrics:
          enabled: false # kube-prometheus-stackがあるのでオフ

        clusterEvents:
          enabled: true
          collector: alloy-singleton

        nodeLogs:
          enabled: true
          collector: alloy-logs

        podLogsViaLoki:
          enabled: true
          collector: alloy-logs

        applicationObservability:
          enabled: true
          collector: alloy-receiver
          receivers:
            otlp:
              http:
                enabled: true
          traces:
            filters:
              span:
                - 'resource.attributes["service.name"] == "garage" and name == "GET /metrics"'
                - 'resource.attributes["service.name"] == "garage" and IsMatch(name, ".* /loki.*")'

        autoInstrumentation:
          enabled: true
          collector: alloy-singleton
          beyla:
            config:
              data:
                discovery:
                  exclude_instrument:
                    - exe_path: ".*alloy.*|.*otelcol.*|.*beyla.*"
                    - k8s_namespace: garage-admin
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
            k8sCache:
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 256Mi

        annotationAutodiscovery:
          enabled: false

        prometheusOperatorObjects:
          enabled: false

        profiling:
          enabled: true
          collector: alloy-profiles
          ebpf:
            enabled: true
          java:
            enabled: true
          pprof:
            enabled: true

        collectors:
          alloy-singleton:
            presets: [singleton]
          alloy-logs:
            presets: [daemonset, filesystem-log-reader]
            # k8s-monitoring Helm chart は alloy-logs 以外の任意名 collector を
            # サポートしないため、audit log 収集を alloy-logs に同居させている。
            # /var/log/kubernetes/audit/ は CP ノードにしか存在しないので、
            # worker の alloy-logs では local.file_match が空 targets を返し、
            # 実質的に CP ノードのみで audit log が収集される。
            extraConfig: |-
              local.file_match "k8s_audit" {
                path_targets = [{
                  __path__ = "/var/log/kubernetes/audit/audit*.log",
                  job      = "integrations/kubernetes/audit",
                  instance = sys.env("HOSTNAME"),
                  cluster  = "seichi-cloud",
                }]
              }

              loki.source.file "k8s_audit" {
                targets       = local.file_match.k8s_audit.targets
                forward_to    = [loki.process.k8s_audit.receiver]
                tail_from_end = true
              }

              loki.process "k8s_audit" {
                // audit イベントは 1 行 1 JSON。
                // user.username や objectRef.resource/namespace をラベル化すると
                // カーディナリティが爆発して Loki が劣化するので、
                // 低カーディナリティな level のみラベル化し、他は log 本文の JSON で検索する
                // (Grafana Explore では `| json | user_username="..."` で絞り込める)
                stage.json {
                  expressions = {
                    audit_level = "level",
                  }
                }
                stage.labels {
                  values = {
                    level = "audit_level",
                  }
                }
                stage.static_labels {
                  values = {
                    source = "k8s-audit",
                  }
                }
                forward_to = [loki.write.localloki.receiver]
              }

              // ---- MariaDB slow query log parsing ----
              // mariadb Pod に同居する "slow-log-tailer" sidecar が slow log を pod stdout に
              // 中継している。default の podLogsViaLoki でも line-by-line で Loki に届くが、
              // それとは別に multiline で 1 イベントに再結合し、structured_metadata を付けて
              // Prometheus ヒストグラムも併発行する。
              discovery.kubernetes "mariadb_slow" {
                role = "pod"
                selectors {
                  role  = "pod"
                  field = "spec.nodeName=" + sys.env("HOSTNAME")
                }
              }

              discovery.relabel "mariadb_slow" {
                targets = discovery.kubernetes.mariadb_slow.targets

                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  regex         = "slow-log-tailer"
                  action        = "keep"
                }
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
                  separator     = "/"
                  replacement   = "/var/log/pods/*$1/*.log"
                  target_label  = "__path__"
                }
              }

              // loki.source.file はグロブ展開をしないので、必ず local.file_match を挟む。
              local.file_match "mariadb_slow" {
                path_targets = discovery.relabel.mariadb_slow.output
              }

              loki.source.file "mariadb_slow" {
                targets       = local.file_match.mariadb_slow.targets
                forward_to    = [loki.process.mariadb_slow.receiver]
                tail_from_end = true
              }

              loki.process "mariadb_slow" {
                // containerd の pod log ヘッダを剥がす
                stage.cri {}

                // MariaDB は同じ秒のクエリでは "# Time:" を省略するので、
                // 毎イベント必ず出現する "# User@Host:" を境界にする。
                // 先頭の "# Time:" 行は前イベントの末尾に混ざるが regex で読み飛ばすので OK。
                stage.multiline {
                  firstline     = "^# User@Host:"
                  max_wait_time = "3s"
                  max_lines     = 500
                }

                // "\\S+" は "root[root]" を greedy に食って後続の "[" で fail するので、
                // user は "[^\\[]+" で "[" の手前までを捕まえる。
                stage.regex {
                  expression = "(?s)User@Host:\\s+(?P<user>[^\\[]+)\\[.*?Query_time:\\s+(?P<query_time>[\\d.]+)\\s+Lock_time:\\s+(?P<lock_time>[\\d.]+)\\s+Rows_sent:\\s+(?P<rows_sent>\\d+)\\s+Rows_examined:\\s+(?P<rows_examined>\\d+)"
                }

                // 低カーディナリティだけ label 化
                stage.labels {
                  values = {
                    user = "",
                  }
                }
                stage.static_labels {
                  values = {
                    source = "mariadb-slow",
                  }
                }

                // 高カーディナリティは structured_metadata (Loki v3 で index されない)
                stage.structured_metadata {
                  values = {
                    query_time    = "",
                    lock_time     = "",
                    rows_examined = "",
                    rows_sent     = "",
                  }
                }

                // Prometheus ヒストグラムとしても発行
                // (Alloy の命名規則で "loki_process_custom_" プレフィックスが付く)
                stage.metrics {
                  metric.histogram {
                    name        = "mariadb_slow_query_seconds"
                    description = "MariaDB slow query execution time (seconds)"
                    source      = "query_time"
                    buckets     = [0.1, 0.25, 0.5, 1, 2, 5, 10]
                  }
                }

                forward_to = [loki.write.localloki.receiver]
              }
          alloy-receiver:
            presets: [deployment]
            extraConfig: |-
              faro.receiver "default" {
                server {
                  listen_address = "0.0.0.0"
                  listen_port    = 12347

                  cors_allowed_origins = ["https://garage-admin.onp.admin.seichi.click"]

                  max_allowed_payload_size = "10MiB"
                }

                output {
                  logs   = [loki.write.localloki.receiver]
                  traces = [otelcol.processor.attributes.localtempo.input]
                }
              }
            alloy:
              extraPorts:
                - name: otlp-http
                  port: 4318
                  targetPort: 4318
                  protocol: TCP
                - name: faro
                  port: 12347
                  targetPort: 12347
                  protocol: TCP
          alloy-profiles:
            presets: [privileged, daemonset]

        alloy-operator:
          deploy: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
