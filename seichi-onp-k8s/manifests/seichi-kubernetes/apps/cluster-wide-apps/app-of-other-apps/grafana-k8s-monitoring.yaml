apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # cascade deletion on this App deletion
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: cluster-wide-apps
  source:
    chart: k8s-monitoring
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 4.0.0
    helm:
      values: |
        cluster:
          name: "seichi-cloud"

        destinations:
          localPrometheus:
            type: prometheus
            url: http://prometheus-kube-prometheus-prometheus:9090

          localLoki:
            type: loki
            url: http://loki-gateway:80/loki/api/v1/push

          localTempo:
            type: otlp
            url: http://tempo:4317
            tls:
              insecure: true
            metrics:
              enabled: false
            logs:
              enabled: false
            traces:
              enabled: true

          localPyroscope:
            type: pyroscope
            url: http://pyroscope:4040/ingest

        clusterMetrics:
          enabled: false # kube-prometheus-stackがあるのでオフ

        clusterEvents:
          enabled: true

        nodeLogs:
          enabled: true

        podLogsViaLoki:
          enabled: true

        applicationObservability:
          enabled: true
          receivers:
            otlp:
              http:
                enabled: true
          traces:
            filters:
              span:
                - 'resource.attributes["service.name"] == "garage" and name == "GET /metrics"'
                - 'resource.attributes["service.name"] == "garage" and IsMatch(name, ".* /loki.*")'

        autoInstrumentation:
          enabled: true
          beyla:
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
            k8sCache:
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 256Mi

        annotationAutodiscovery:
          enabled: false

        prometheusOperatorObjects:
          enabled: false

        profiling:
          enabled: true
          ebpf:
            enabled: true
          java:
            enabled: true
          pprof:
            enabled: true

        collectors:
          alloy-metrics:
            presets: [deployment]
          alloy-singleton:
            presets: [singleton]
          alloy-logs:
            presets: [daemonset, filesystem-log-reader]
          alloy-receiver:
            presets: [deployment]
            extraConfig: |-
              faro.receiver "default" {
                server {
                  listen_address = "0.0.0.0"
                  listen_port    = 12347

                  cors_allowed_origins = ["https://garage-admin.onp.admin.seichi.click"]

                  max_allowed_payload_size = "10MiB"
                }

                output {
                  logs   = [loki.write.localloki.receiver]
                  traces = [otelcol.processor.attributes.localtempo.input]
                }
              }
            alloy:
              extraPorts:
                - name: otlp-http
                  port: 4318
                  targetPort: 4318
                  protocol: TCP
                - name: faro
                  port: 12347
                  targetPort: 12347
                  protocol: TCP
          alloy-profiles:
            presets: [privileged, daemonset]

        alloy-operator:
          deploy: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
