apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # cascade deletion on this App deletion
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: cluster-wide-apps
  source:
    chart: k8s-monitoring
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 4.0.1
    helm:
      values: |
        cluster:
          name: "seichi-cloud"

        destinations:
          localPrometheus:
            type: prometheus
            url: http://prometheus-kube-prometheus-prometheus:9090

          localLoki:
            type: loki
            url: http://loki-gateway:80/loki/api/v1/push

          localTempo:
            type: otlp
            url: http://tempo:4317
            tls:
              insecure: true
            metrics:
              enabled: false
            logs:
              enabled: false
            traces:
              enabled: true

          localPyroscope:
            type: pyroscope
            url: http://pyroscope:4040

        clusterMetrics:
          enabled: false # kube-prometheus-stackがあるのでオフ

        clusterEvents:
          enabled: true
          collector: alloy-singleton

        nodeLogs:
          enabled: true
          collector: alloy-logs

        podLogsViaLoki:
          enabled: true
          collector: alloy-logs

        applicationObservability:
          enabled: true
          collector: alloy-receiver
          receivers:
            otlp:
              http:
                enabled: true
          traces:
            filters:
              span:
                - 'resource.attributes["service.name"] == "garage" and name == "GET /metrics"'
                - 'resource.attributes["service.name"] == "garage" and IsMatch(name, ".* /loki.*")'

        autoInstrumentation:
          enabled: true
          collector: alloy-singleton
          beyla:
            config:
              data:
                discovery:
                  exclude_instrument:
                    - exe_path: ".*alloy.*|.*otelcol.*|.*beyla.*"
                    - k8s_namespace: garage-admin
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
            k8sCache:
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 256Mi

        annotationAutodiscovery:
          enabled: false

        prometheusOperatorObjects:
          enabled: false

        profiling:
          enabled: true
          collector: alloy-profiles
          ebpf:
            enabled: true
          java:
            enabled: true
          pprof:
            enabled: true

        collectors:
          alloy-singleton:
            presets: [singleton]
          alloy-logs:
            presets: [daemonset, filesystem-log-reader]
            # k8s-monitoring Helm chart は alloy-logs 以外の任意名 collector を
            # サポートしないため、audit log 収集を alloy-logs に同居させている。
            # /var/log/kubernetes/audit/ は CP ノードにしか存在しないので、
            # worker の alloy-logs では local.file_match が空 targets を返し、
            # 実質的に CP ノードのみで audit log が収集される。
            extraConfig: |-
              local.file_match "k8s_audit" {
                path_targets = [{
                  __path__ = "/var/log/kubernetes/audit/audit*.log",
                  job      = "integrations/kubernetes/audit",
                  instance = sys.env("HOSTNAME"),
                  cluster  = "seichi-cloud",
                }]
              }

              loki.source.file "k8s_audit" {
                targets       = local.file_match.k8s_audit.targets
                forward_to    = [loki.process.k8s_audit.receiver]
                tail_from_end = true
              }

              loki.process "k8s_audit" {
                // audit イベントは 1 行 1 JSON。
                // user.username や objectRef.resource/namespace をラベル化すると
                // カーディナリティが爆発して Loki が劣化するので、
                // 低カーディナリティな level のみラベル化し、他は log 本文の JSON で検索する
                // (Grafana Explore では `| json | user_username="..."` で絞り込める)
                stage.json {
                  expressions = {
                    audit_level = "level",
                  }
                }
                stage.labels {
                  values = {
                    level = "audit_level",
                  }
                }
                stage.static_labels {
                  values = {
                    source = "k8s-audit",
                  }
                }
                forward_to = [loki.write.localloki.receiver]
              }
          alloy-receiver:
            presets: [deployment]
            extraConfig: |-
              faro.receiver "default" {
                server {
                  listen_address = "0.0.0.0"
                  listen_port    = 12347

                  cors_allowed_origins = ["https://garage-admin.onp.admin.seichi.click"]

                  max_allowed_payload_size = "10MiB"
                }

                output {
                  logs   = [loki.write.localloki.receiver]
                  traces = [otelcol.processor.attributes.localtempo.input]
                }
              }
            alloy:
              extraPorts:
                - name: otlp-http
                  port: 4318
                  targetPort: 4318
                  protocol: TCP
                - name: faro
                  port: 12347
                  targetPort: 12347
                  protocol: TCP
          alloy-profiles:
            presets: [privileged, daemonset]

        alloy-operator:
          deploy: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
