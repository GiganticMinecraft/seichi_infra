apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-ghcr-image-signatures
  annotations:
    policies.kyverno.io/title: Verify GHCR Image Signatures
    policies.kyverno.io/description: >-
      ghcr.io/giganticminecraft/* のコンテナイメージが
      GitHub Actions の Cosign keyless signing で署名されていることを検証する。
      署名されていないイメージのデプロイをブロックする。
spec:
  validationFailureAction: Audit
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-giganticminecraft-images
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - mutateDigest: false
          verifyDigest: true
          required: true
          useCache: true
          # ビルド側は cosign sign --registry-referrers-mode=oci-1-1 で署名しており、
          # 署名は OCI 1.1 形式 (fallback タグ sha256-<digest>) で保存される。
          # Kyverno はデフォルトではレガシー形式 (sha256-<digest>.sig タグ) しか
          # 探さないため、これを有効にしないと署名済みイメージでも
          # "no signatures found" になる
          cosignOCI11: true
          imageReferences:
            - "ghcr.io/giganticminecraft/*"
          attestors:
            - entries:
                - keyless:
                    subjectRegExp: "https://github\\.com/GiganticMinecraft/.+"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
                  signatureAlgorithm: sha256
