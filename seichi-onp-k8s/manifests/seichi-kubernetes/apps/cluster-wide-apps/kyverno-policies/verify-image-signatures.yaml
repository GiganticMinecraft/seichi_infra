apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-ghcr-image-signatures
  annotations:
    policies.kyverno.io/title: Verify GHCR Image Signatures
    policies.kyverno.io/description: >-
      ghcr.io/giganticminecraft/* のコンテナイメージが
      GitHub Actions の Cosign keyless signing で署名されていることを検証する。
      署名されていないイメージのデプロイをブロックする。
spec:
  validationFailureAction: Audit
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-giganticminecraft-images
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - mutateDigest: false
          verifyDigest: true
          required: true
          useCache: true
          # 署名はレガシー Cosign 形式 (sha256-<digest>.sig タグ) を前提とする。
          # cosign v3 デフォルトの sigstore bundle 形式は、ghcr.io が OCI 1.1
          # referrers API 非対応のため fallback タグに保存されるが、その index の
          # descriptor に正しい artifactType が乗らず Kyverno が bundle を発見
          # できない (type: SigstoreBundle でも検証不可)。このためビルド側は
          # --new-bundle-format=false でレガシー形式に署名している
          imageReferences:
            - "ghcr.io/giganticminecraft/*"
          attestors:
            - entries:
                - keyless:
                    subjectRegExp: "https://github\\.com/GiganticMinecraft/.+"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
                  signatureAlgorithm: sha256
