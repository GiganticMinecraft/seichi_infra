apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-pvc-storage-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Infrastructure"
data:
  k8s-pvc-storage-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "description": "Kubernetes PVC storage usage by StorageClass and Namespace",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "panels": [],
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "count(kube_persistentvolumeclaim_info{namespace=~\"$namespace\", storageclass=~\"$storageclass\"})", "refId": "A" }
          ],
          "title": "Total PVCs",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum(kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"})", "refId": "A" }
          ],
          "title": "Total Used",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum(kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"})", "refId": "A" }
          ],
          "title": "Total Capacity",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 90 }] },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": { "minVizHeight": 75, "minVizWidth": 75, "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum(kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}) / sum(kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}) * 100", "refId": "A" }
          ],
          "title": "Overall Usage %",
          "type": "gauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 6 },
          "id": 200,
          "panels": [],
          "title": "PVC Details",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "PVCs with bound Pod, used/capacity, and usage %. Backup Job Pods are excluded from Pod column.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "inspect": false },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Used" }, "properties": [{ "id": "unit", "value": "bytes" }] },
              { "matcher": { "id": "byName", "options": "Capacity" }, "properties": [{ "id": "unit", "value": "bytes" }] },
              { "matcher": { "id": "byName", "options": "Usage %" }, "properties": [{ "id": "unit", "value": "percent" }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 90 }] } }, { "id": "custom.cellOptions", "value": { "mode": "gradient", "type": "gauge" } }] }
            ]
          },
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 7 },
          "id": 5,
          "options": { "cellHeight": "sm", "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Usage %" }] },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}", "format": "table", "instant": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}", "format": "table", "instant": true, "refId": "B" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"} / (kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}) * 100", "format": "table", "instant": true, "refId": "C" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "max by(namespace, persistentvolumeclaim, pod) (kube_pod_spec_volumes_persistentvolumeclaims_info{namespace=~\"$namespace\", pod!~\"backup--.*\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"})", "format": "table", "instant": true, "refId": "D" }
          ],
          "title": "All PVCs",
          "transformations": [
            { "id": "seriesToColumns", "options": { "byField": "persistentvolumeclaim" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Time 1": true, "Time 2": true, "Time 3": true, "Time 4": true, "__name__": true, "__name__ 1": true, "__name__ 2": true, "__name__ 3": true, "__name__ 4": true, "container": true, "container 1": true, "container 2": true, "container 3": true, "container 4": true, "endpoint": true, "endpoint 1": true, "endpoint 2": true, "endpoint 3": true, "endpoint 4": true, "instance": true, "instance 1": true, "instance 2": true, "instance 3": true, "instance 4": true, "job": true, "job 1": true, "job 2": true, "job 3": true, "job 4": true, "metrics_path": true, "metrics_path 1": true, "metrics_path 2": true, "metrics_path 3": true, "namespace 1": true, "namespace 2": true, "namespace 3": true, "node": true, "node 1": true, "node 2": true, "service": true, "service 1": true, "service 2": true, "service 3": true, "service 4": true, "uid": true, "volume": true, "Value #D": true }, "indexByName": { "namespace": 0, "persistentvolumeclaim": 1, "pod": 2, "Value #A": 3, "Value #B": 4, "Value #C": 5 }, "renameByName": { "Value #A": "Used", "Value #B": "Capacity", "Value #C": "Usage %", "namespace": "Namespace", "persistentvolumeclaim": "PVC", "pod": "Pod" } } }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 21 },
          "id": 300,
          "panels": [],
          "title": "Top Usage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 90 }] },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 22 },
          "id": 6,
          "options": { "displayMode": "gradient", "minVizHeight": 16, "minVizWidth": 0, "namePlacement": "auto", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": true }, "showUnfilled": true, "valueMode": "color" },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "topk(10, kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"} / (kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}) * 100)", "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}", "instant": true, "refId": "A" }
          ],
          "transformations": [
            { "id": "sortBy", "options": { "fields": {}, "sort": [{ "field": "Value", "desc": true }] } }
          ],
          "title": "Usage % by PVC (Top 10)",
          "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "mappings": [],
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 22 },
          "id": 7,
          "options": { "barRadius": 0, "barWidth": 0.8, "fullHighlight": false, "groupWidth": 0.7, "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" }, "orientation": "horizontal", "showValue": "auto", "stacking": "none", "tooltip": { "mode": "single", "sort": "none" }, "xTickLabelRotation": 0 },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "topk(10, kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"})", "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}", "instant": true, "refId": "A" }
          ],
          "transformations": [
            { "id": "sortBy", "options": { "fields": {}, "sort": [{ "field": "Value", "desc": true }] } }
          ],
          "title": "Used by PVC (Top 10)",
          "type": "barchart"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "id": 400,
          "panels": [],
          "title": "Trends",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 10, "gradientMode": "none", "hideFrom": { "legend": false, "tooltip": false, "viz": false }, "lineInterpolation": "smooth", "lineWidth": 2, "pointSize": 5, "scaleDistribution": { "type": "linear" }, "showPoints": "never", "spanNulls": false, "stacking": { "group": "A", "mode": "none" }, "thresholdsStyle": { "mode": "off" } },
              "mappings": [],
              "unit": "percent",
              "max": 100,
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 33 },
          "id": 8,
          "options": { "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "right" }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"} / (kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}) * 100", "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}", "refId": "A" }
          ],
          "title": "Usage % Over Time",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 10, "gradientMode": "none", "hideFrom": { "legend": false, "tooltip": false, "viz": false }, "lineInterpolation": "smooth", "lineWidth": 2, "pointSize": 5, "scaleDistribution": { "type": "linear" }, "showPoints": "never", "spanNulls": false, "stacking": { "group": "A", "mode": "none" }, "thresholdsStyle": { "mode": "off" } },
              "mappings": [],
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 43 },
          "id": 9,
          "options": { "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "right" }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} * on(namespace, persistentvolumeclaim) group_left() kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}", "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}", "refId": "A" }
          ],
          "title": "Used Over Time",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubernetes", "storage"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "queryValue": "",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": { "selected": false, "text": "sc-truenas-03-iscsi", "value": "sc-truenas-03-iscsi" },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(kube_persistentvolumeclaim_info, storageclass)",
            "hide": 0,
            "includeAll": false,
            "label": "StorageClass",
            "multi": false,
            "name": "storageclass",
            "options": [],
            "query": { "qryType": 1, "query": "label_values(kube_persistentvolumeclaim_info, storageclass)", "refId": "PrometheusVariableQueryEditor-VariableQuery" },
            "refresh": 2,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          },
          {
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}, namespace)",
            "hide": 0,
            "includeAll": true,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": { "qryType": 1, "query": "label_values(kube_persistentvolumeclaim_info{storageclass=~\"$storageclass\"}, namespace)", "refId": "PrometheusVariableQueryEditor-VariableQuery" },
            "refresh": 2,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "Asia/Tokyo",
      "title": "Kubernetes PVC Storage",
      "uid": "k8s-pvc-storage",
      "version": 1
    }
