name: CI
on: 
  push:
    paths:
      - ".github/workflows/mod_downloader.yaml"
      - "docker-images/mod-downloader/**"

env:
  IMAGE: ghcr.io/giganticminecraft/mod-downloader

jobs:
  lint-and-test:
    name: Lint and test application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: 'docker-images/mod-downloader/go.mod'
          cache-dependency-path: 'docker-images/mod-downloader/go.sum'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          working-directory: docker-images/mod-downloader

  build-image:
    name: Build docker image (and publish on master)
    needs: [lint-and-test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    defaults:
      run:
        working-directory: docker-images/mod-downloader
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE }}
          # 1.0.0 は再 push される安定タグ。マニフェスト側は 1.0.0@sha256:... で参照し、
          # digest の更新は Renovate が追従する (mcserver 系イメージと同じ方式)
          tags: |
            type=sha,prefix=sha-,suffix=,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=1.0.0

      - name: Build (and push if on main)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./docker-images/mod-downloader/
          builder: ${{ steps.buildx.outputs.name }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          # すべてのビルドステージのすべてのレイヤーをキャッシュして欲しいのでmode=max
          cache-to: type=gha,mode=max

      - name: Sign container image with Cosign
        if: github.ref == 'refs/heads/main'
        run: |
          # ghcr.io は OCI 1.1 referrers API 非対応で、cosign v3 デフォルトの bundle 形式の
          # 署名は Kyverno が発見できないため、レガシー形式 (.sig タグ) で署名する
          cosign sign --yes --new-bundle-format=false --use-signing-config=false \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      # Kyverno のポリシー (verify-image-signatures.yaml) と同じ条件で検証し、
      # 署名と検証側のモードがズレた瞬間に CI を fail させる。
      - name: Verify signature like Kyverno does
        if: github.ref == 'refs/heads/main'
        run: |
          cosign verify \
            --certificate-identity-regexp 'https://github\.com/GiganticMinecraft/.+' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

          # 素の cosign verify は bundle 形式も透過的に読めてしまい形式のズレを
          # 検出できないため、レガシー形式 (.sig タグ) の存在も別途確認する
          docker buildx imagetools inspect "$(cosign triangulate ${{ env.IMAGE }}@${{ steps.build.outputs.digest }})"

      - name: Run Trivy vulnerability scanner
        if: steps.build.outputs.digest != ''
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        if: always() && steps.build.outputs.digest != ''
        with:
          sarif_file: 'trivy-results.sarif'
