name: CI
on:
  push:
    paths:
      - ".github/workflows/truenas_exporter.yaml"
      - "docker-images/truenas-exporter/**"

env:
  IMAGE: ghcr.io/giganticminecraft/truenas-exporter

jobs:
  lint-and-test:
    name: Lint and test application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'docker-images/truenas-exporter/go.mod'
          cache-dependency-path: 'docker-images/truenas-exporter/go.sum'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.6
          working-directory: docker-images/truenas-exporter
      - name: Test
        working-directory: docker-images/truenas-exporter
        run: go test ./...

  build-image:
    name: Build docker image (and publish on master)
    needs: [lint-and-test]
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docker-images/truenas-exporter
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,suffix=,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build (and push if on main)
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ./docker-images/truenas-exporter/
          builder: ${{ steps.buildx.outputs.name }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
