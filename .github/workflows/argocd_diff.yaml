name: ArgoCD Diff

on:
  pull_request:
    paths:
      - "seichi-onp-k8s/manifests/seichi-kubernetes/**"

jobs:
  argocd-diff:
    name: ArgoCD Diff
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Find affected ArgoCD apps
        id: find-apps
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_SERVER: argocd.onp-k8s.admin.seichi.click
        run: |
          # PR で変更されたファイル一覧を取得
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "${changed_files}"

          # ArgoCD アプリ一覧と source.path を JSON で取得し、
          # 変更ファイルに関係するアプリだけを抽出する
          argocd app list \
            --server "${ARGOCD_SERVER}" \
            --grpc-web \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            -o json | python3 -c "
          import json, sys

          changed_files = '''${changed_files}'''.strip().split('\n')
          data = json.load(sys.stdin)
          items = data.get('items', data) if isinstance(data, dict) else data

          affected = []
          for item in items:
              name = item['metadata']['name']
              src = item['spec'].get('source', {})
              path = src.get('path', '')
              if not path or not path.startswith('seichi-onp-k8s/manifests/seichi-kubernetes/'):
                  continue
              # 変更ファイルがアプリの source.path 配下にあるかチェック
              for f in changed_files:
                  if f.startswith(path + '/') or f == path:
                      affected.append(name)
                      break

          for a in affected:
              print(a)
          " > /tmp/affected-apps.txt

          app_count=$(wc -l < /tmp/affected-apps.txt | tr -d ' ')
          echo "Affected apps (${app_count}):"
          cat /tmp/affected-apps.txt

          if [ "${app_count}" -eq 0 ]; then
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get ArgoCD app diff
        if: steps.find-apps.outputs.has_apps == 'true'
        id: argocd-diff
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_SERVER: argocd.onp-k8s.admin.seichi.click
        run: |
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          has_diff=false
          touch /tmp/argocd-diff-output.md

          while IFS= read -r app; do
            [ -z "${app}" ] && continue
            echo "::group::Checking diff for ${app}"

            set +e
            result=$(argocd app diff "${app}" \
              --server "${ARGOCD_SERVER}" \
              --grpc-web \
              --auth-token "${ARGOCD_AUTH_TOKEN}" \
              --revision "${PR_HEAD_SHA}" \
              2>&1)
            exit_code=$?
            set -e

            echo "${result}"
            echo "::endgroup::"

            if [ ${exit_code} -eq 1 ]; then
              has_diff=true
              echo "<details>" >> /tmp/argocd-diff-output.md
              printf '<summary>📝 %s (diff detected)</summary>\n\n' "${app}" >> /tmp/argocd-diff-output.md
              echo '```diff' >> /tmp/argocd-diff-output.md
              echo "${result}" >> /tmp/argocd-diff-output.md
              echo '```' >> /tmp/argocd-diff-output.md
              echo "</details>" >> /tmp/argocd-diff-output.md
              echo "" >> /tmp/argocd-diff-output.md
            elif [ ${exit_code} -ge 2 ]; then
              has_diff=true
              echo "<details>" >> /tmp/argocd-diff-output.md
              printf '<summary>⚠️ %s (error)</summary>\n\n' "${app}" >> /tmp/argocd-diff-output.md
              echo '```' >> /tmp/argocd-diff-output.md
              echo "${result}" >> /tmp/argocd-diff-output.md
              echo '```' >> /tmp/argocd-diff-output.md
              echo "</details>" >> /tmp/argocd-diff-output.md
              echo "" >> /tmp/argocd-diff-output.md
            fi
          done < /tmp/affected-apps.txt

          echo "has_diff=${has_diff}" >> "$GITHUB_OUTPUT"

      - name: Build comment body
        if: steps.argocd-diff.outputs.has_diff == 'true'
        run: |
          {
            echo "## ArgoCD Diff Result"
            echo ""
            echo '`argocd app diff --revision ${{ github.event.pull_request.head.sha }}` の結果、以下の差分・エラーが検出されました。'
            echo ""
            cat /tmp/argocd-diff-output.md
          } > /tmp/argocd-comment.md

      - name: Comment on Pull Request
        if: steps.argocd-diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_comment_id=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("## ArgoCD Diff Result")) | .id' \
            | head -n 1)

          if [ -n "${existing_comment_id}" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${existing_comment_id}" \
              -F body=@/tmp/argocd-comment.md
          else
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/argocd-comment.md
          fi

      - name: Remove comment if no diff
        if: steps.argocd-diff.outputs.has_diff == 'false' || steps.find-apps.outputs.has_apps == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_comment_id=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("## ArgoCD Diff Result")) | .id' \
            | head -n 1)

          if [ -n "${existing_comment_id}" ]; then
            gh api \
              --method DELETE \
              "repos/${{ github.repository }}/issues/comments/${existing_comment_id}"
          fi
