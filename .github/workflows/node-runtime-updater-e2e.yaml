name: node-runtime-updater e2e

on:
  pull_request:
    paths:
      - "seichi-onp-k8s/manifests/seichi-kubernetes/apps/cluster-wide-apps/node-runtime-updater/**"
      - ".github/workflows/node-runtime-updater-e2e.yaml"

jobs:
  e2e:
    name: node-runtime-updater e2e
    runs-on: ubuntu-latest
    # 実ノードに近い Ubuntu 24.04 の使い捨てコンテナ内で、実際の GitHub releases を
    # 使ってステージング -> 部分適用からの回復 -> 適用 -> 収束のシナリオを検証する
    container: ubuntu:24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install prerequisites
        run: apt-get -qq update && apt-get -qq install -y curl ca-certificates

      - name: Run e2e test
        env:
          NODE_RUNTIME_UPDATER_E2E: "1"
        run: sh seichi-onp-k8s/manifests/seichi-kubernetes/apps/cluster-wide-apps/node-runtime-updater/test/e2e.sh
